name: Build & Deploy

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore dependencies
        run: dotnet restore GameService/API/API.csproj

      - name: Build
        run: dotnet build GameService/API/API.csproj --configuration Release --no-restore

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Docker image
        run: docker build -t longdong123/shroomfall-gamems:latest .

      - name: Push Docker image
        run: docker push longdong123/shroomfall-gamems:latest


  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e

            cd /root   # folder where compose.yml exists

            echo "Pulling latest image..."
            docker pull longdong123/shroomfall-gamems:latest

            echo "Restarting services with compose..."
            docker compose down
            docker compose up -d --remove-orphans

            echo "Deployment completed"