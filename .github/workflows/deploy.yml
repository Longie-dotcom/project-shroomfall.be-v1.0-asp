name: Build & Deploy

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Publish
        run: dotnet publish API/API.csproj -c Release -o out

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Docker image
        run: docker build -t longdong123/shroomfall-gamems:latest .

      - name: Push Docker image
        run: docker push longdong123/shroomfall-gamems:latest


  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e

            echo "Pulling latest image..."
            docker pull longdong123/shroomfall-gamems:latest

            echo "Running database migration..."
            docker run --rm \
              --network shroomfall_default \
              -e SQL_CONNECTION_STRING="${{ secrets.SQL_CONNECTION_STRING }}" \
              -e MONGO_CONNECTION_STRING="${{ secrets.MONGO_CONNECTION_STRING }}" \
              -e MONGO_DATABASE_NAME="${{ secrets.MONGO_DATABASE_NAME }}" \
              -e JWT_KEY="${{ secrets.JWT_KEY }}" \
              -e JWT_ISSUER="${{ secrets.JWT_ISSUER }}" \
              -e JWT_AUDIENCE="${{ secrets.JWT_AUDIENCE }}" \
              longdong123/shroomfall-gamems:latest \
              dotnet ef database update --project Infrastructure --startup-project API

            echo "Restarting container..."

            docker stop gamems || true
            docker rm gamems || true

            docker run -d \
              --name gamems \
              -p 5000:8080 \
              --restart unless-stopped \
              longdong123/shroomfall-gamems:latest

            echo "Deployment completed"