version: "3.9"

services:
  gamems:
    image: longdong123/shroomfall-gamems:latest
    container_name: gamems
    ports:
      - "5000:8080"
    depends_on:
      - sqlserver
      - mongodb
    env_file:
      - .env

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver
    ports:
      - "1433:1433"
    env_file:
      - .env
    environment:
      ACCEPT_EULA: "Y"
    volumes:
      - sql_data:/var/opt/mssql

  mongodb:
    image: mongo:7
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  sql_data:
  mongo_data: